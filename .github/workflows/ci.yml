name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run package

  # Optional: Run tests on multiple VS Code versions
  test-multiple-versions:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        vscode-version: ["1.85.0", "1.95.0", "latest"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests (VS Code ${{ matrix.vscode-version }})
        run: npm run test
        env:
          VSCODE_VERSION: ${{ matrix.vscode-version }}
