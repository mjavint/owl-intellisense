name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Disable npm exit handlers
        run: npm config set script-shell "bash -e"

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --progress=false

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check-types

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run package

  test-multiple-versions:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        vscode-version: ["1.95.0", "latest"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --progress=false

      - name: Run tests (VS Code ${{ matrix.vscode-version }})
        run: npm test
        env:
          VSCODE_VERSION: ${{ matrix.vscode-version }}
